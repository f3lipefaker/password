apiVersion: apps/v1
kind: Deployment
metadata:
  name: password
  namespace: viptech
  labels:
    app: password
spec:
  replicas: 1
  selector:
    matchLabels:
      app: password
  template:
    metadata:
      labels:
        app: password
    spec:
      containers:
        - name: password
          image: juca266/password:latest
          ports:
            - containerPort: 4000
          env:
            - name: TZ
              value: America/Sao_Paulo
          volumeMounts:
            - name: tz-config
              mountPath: /etc/localtime
              readOnly: true
      volumes:
        - name: tz-config
          hostPath:
            path: /etc/localtime