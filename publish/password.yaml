apiVersion: apps/v1
kind: Deployment
metadata:
  name: template
  namespace: viptech
  labels:
    app: template
spec:
  replicas: 1
  selector:
    matchLabels:
      app: template
  template:
    metadata:
      labels:
        app: template
    spec:
      containers:
        - name: template
          image: juca266/template:latest
          ports:
            - containerPort: 4000
          env:
            - name: TZ
              value: America/Sao_Paulo
          volumeMounts:
            - name: tz-config
              mountPath: /etc/localtime
              readOnly: true
      volumes:
        - name: tz-config
          hostPath:
            path: /etc/localtime